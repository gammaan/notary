services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notary
      POSTGRES_USER: notary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notary}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notary -d notary"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://notary:${POSTGRES_PASSWORD:-notary}@db:5432/notary
      DJANGO_DEBUG: "false"
      USE_PROXY_SSL_HEADER: "true"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
