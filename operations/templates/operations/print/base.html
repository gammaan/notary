{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Print{% endblock %} | Himilo Notary</title>
    <link rel="stylesheet" href="{% static 'css/print.css' %}">
</head>
<body class="print-body">
    <div class="print-page">
        {% block content %}{% endblock %}
    </div>
    <div class="print-toolbar no-print">
        <button type="button" class="print-toolbar__btn" onclick="window.print()">Print</button>
        <button type="button" class="print-toolbar__btn print-toolbar__btn--ghost" onclick="window.close()">Close</button>
    </div>
</body>
</html>
