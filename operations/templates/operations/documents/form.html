{% extends "operations/base_staff.html" %}
{% load i18n %}
{% block page_title %}{% trans "Edit document" %} — {{ matter.reference_number }}{% endblock %}
{% block content %}
<div class="staff-form-wrap">
    <p class="staff-step-label">{{ matter.reference_number }} · {{ document.title }}</p>
    <form class="staff-form staff-form--compact" method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        <div class="row">
            <label class="col-6"><span>{% trans "Title" %}</span>{{ form.title }}</label>
            <label class="col-6"><span>{% trans "Document type" %}</span>{{ form.document_type }}</label>
        </div>
        <div class="row">
            <label class="col-12"><span>{% trans "File" %}</span>{{ form.file }}{% if document.file %}<small>{% trans "Leave blank to keep current file." %}</small>{% endif %}</label>
        </div>
        <div class="row">
            <label class="col-6"><span>{% trans "Status" %}</span>{{ form.status }}</label>
            <label class="col-6"><span>{% trans "Notes" %}</span>{{ form.notes }}</label>
        </div>
        <div class="staff-form-actions">
            <button class="button primary" type="submit">{% trans "Save document" %}</button>
            <a class="button ghost" href="{% url 'staff:matter_detail' matter.uuid %}">{% trans "Cancel" %}</a>
        </div>
    </form>
</div>
{% endblock %}
