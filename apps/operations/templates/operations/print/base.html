{% load static i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% trans "Print" %}{% endblock %} | Notaria Notary</title>
    <link rel="stylesheet" href="{% static 'apps/admin/print.css' %}">
</head>
<body class="print-body">
    <div class="print-page">
        {% block content %}{% endblock %}
    </div>
    <div class="print-toolbar no-print">
        <button type="button" class="print-toolbar__btn" onclick="window.print()">{% trans "Print" %}</button>
        <button type="button" class="print-toolbar__btn print-toolbar__btn--ghost" onclick="window.close()">{% trans "Close" %}</button>
    </div>
</body>
</html>
